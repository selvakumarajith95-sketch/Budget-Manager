<!DOCTYPE html>
<html>

<head>

  <title>Login</title>

  <style>

    body {
      font-family: Arial;
      background: #f3f4f6;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .login-box {
      background: white;
      padding: 30px;
      border-radius: 12px;
      width: 320px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      background: #2563eb;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 10px;
      font-size: 16px;
    }

    button:hover {
      background: #1e40af;
    }

  </style>

</head>

<body>

  <div class="login-box">

    <h2>Budget Tracker Login</h2>

    <input type="email"
           id="authEmail"
           placeholder="Email">

    <input type="password"
           id="authPassword"
           placeholder="Password">

    <button onclick="registerUser()">
      Register
    </button>

    <button onclick="loginUser()">
      Login
    </button>

  </div>

  <script type="module">

    import { initializeApp }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

    import {
      getAuth,
      createUserWithEmailAndPassword,
      signInWithEmailAndPassword
    }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {

      apiKey: "AIzaSyA_MnvrnywML4wcE4VyIdVJWOi1bG9IjWc",
      authDomain: "budget-manager-8d41d.firebaseapp.com",
      projectId: "budget-manager-8d41d",
      storageBucket: "budget-manager-8d41d.firebasestorage.app",
      messagingSenderId: "621042299694",
      appId: "1:621042299694:web:617f3f8b15bc49c17580bf"

    };

    const app = initializeApp(firebaseConfig);

    const auth = getAuth(app);

    async function registerUser() {

      const email =
        document.getElementById("authEmail").value;

      const password =
        document.getElementById("authPassword").value;

      try {

        await createUserWithEmailAndPassword(
          auth,
          email,
          password
        );

        alert("Registration Success");

      } catch(error) {

        alert(error.message);

      }
    }

    async function loginUser() {

      const email =
        document.getElementById("authEmail").value;

      const password =
        document.getElementById("authPassword").value;

      try {

        await signInWithEmailAndPassword(
          auth,
          email,
          password
        );

        alert("Login Success");

        window.location.href = "index.html";

      } catch(error) {

        alert(error.message);

      }
    }

    window.registerUser = registerUser;
    window.loginUser = loginUser;

  </script>

</body>
</html>
